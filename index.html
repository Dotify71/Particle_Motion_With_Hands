<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesture Controlled Particles - Extended</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Segoe UI', sans-serif;
        }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            width: 240px;
            transition: all 0.3s ease;
        }
        h2 {
            margin: 0 0 15px 0;
            font-size: 1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .control-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-size: 0.8rem;
            margin-bottom: 5px;
            opacity: 0.8;
        }
        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        button {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        button {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        button {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            transition:0.2s;
            font-size: 0.75rem;
        }
        button:hover,
        button.active {
            background: #ffffff;
            color: #000;
        }
        input[type="color"] {
            width: 100%;
            height: 35px;
            border: none;
            background: none;
            cursor: pointer;
        }
        #status {
            margin-top: 10px;
            font-size: 0.75rem;
            color: #00ff88;
        }
        #input_video {
            display: none;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    
</body>
</html>
