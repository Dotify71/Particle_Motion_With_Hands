<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesture Controlled Particles - Extended</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Segoe UI', sans-serif;
        }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            width: 240px;
            transition: all 0.3s ease;
        }
        h2 {
            margin: 0 0 15px 0;
            font-size: 1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .control-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-size: 0.8rem;
            margin-bottom: 5px;
            opacity: 0.8;
        }
        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        button {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        button {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        button {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            transition:0.2s;
            font-size: 0.75rem;
        }
        button:hover,
        button.active {
            background: #ffffff;
            color: #000;
        }
        input[type="color"] {
            width: 100%;
            height: 35px;
            border: none;
            background: none;
            cursor: pointer;
        }
        #status {
            margin-top: 10px;
            font-size: 0.75rem;
            color: #00ff88;
        }
        #input_video {
            display: none;
        }
        canvas {
            display: block;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
    <div id="ui-container">
        <h2>Particle Control</h2>
        <div class="control-group">
            <label>Shape Template</label>
            <div class="btn-grid">
                <button onclick="setShape('heart')" class="active" id="btn-heart">Heart</button>
                <button onclick="setShape('flower')" id="btn-flower">Flower</button>
                <button onclick="setShape('saturn')" id="btn-saturn">Saturn</button>
                <button onclick="setShape('fireworks')" id="btn-fireworks">Fireworks</button>
                <button onclick="setShape('pyramid')" id="btn-fireworks">Pyramid</button>
                <button onclick="setShape('dna')" id="btn-dna">DNA</button>
                <button onclick="setShape('torus')" id="btn-torus">Donut</button>
                <button onclick="setShape('galaxy')" id="btn-galaxy">Galaxy</button>
            </div>
        </div>
        <div class="control-group">
            <label>Particle Color</label>
            <input type="color" id="colorPicker" value="ff0055">
        </div>
        <div id="status">Waiting for camera...</div>
        <div style="font-size: 0.7rem; margin-top: 5px; opacity: 0.6;">
            Open Hand: Expand<br>
            Close Hand: Contract
        </div>
    </div>
    <video id="input_video"></video>
</body>
</html>
